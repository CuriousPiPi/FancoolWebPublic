<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>访问受限</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; padding: 24px; }
    .card { max-width: 760px; margin: 12vh auto; border: 1px solid #ddd; border-radius: 12px; padding: 24px; }
    code { background: #f6f8fa; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>应用访问受限</h2>
    <p>{{ error_message or '当前设备访问受限，请联系管理员。' }}</p>
    {% if user_identifier %}
    <p><strong>user_identifier：</strong> <code>{{ user_identifier }}</code></p>
    {% endif %}
  </div>
</body>
</html>
